name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"

          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag must use vX.Y.Z format; got $TAG_NAME" >&2
            exit 1
          fi

          if [ "$TAG_NAME" != "v$PACKAGE_VERSION" ]; then
            echo "release tag $TAG_NAME does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Run release-confidence suite
        run: npm run test:release

      - name: Dry-run pack
        run: npm pack --dry-run

      - name: Print publish metadata
        run: |
          PACKAGE_NAME="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          REPOSITORY_URL="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).repository.url")"

          echo "package name: $PACKAGE_NAME"
          echo "package version: $PACKAGE_VERSION"
          echo "repository.url: $REPOSITORY_URL"

      - name: Check if version is already published
        id: npm-version
        run: |
          PACKAGE_NAME="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip publish when version already exists
        if: steps.npm-version.outputs.already_published == 'true'
        run: |
          PACKAGE_NAME="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published on npm; skipping publish"

      - name: Publish to npm
        if: steps.npm-version.outputs.already_published != 'true'
        run: npm publish --provenance --access public
